spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/users_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

grpc:
  server:
    port: ${GRPC_PORT:9090}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-to-at-least-32-characters}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-no-request-id}] [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    si.um.feri.userservice: DEBUG
